<title>Connexion</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h2>Connexion</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="mdp" placeholder="Mot de passe"><br><br>

<button onclick="connecter()">Se connecter</button>

<p id="message"></p>

<script>
function connecter() {
    let email = document.getElementById("email").value;
    let mdp = document.getElementById("mdp").value;

    let emailStock = localStorage.getItem("email");
    let mdpStock = localStorage.getItem("mdp");

    if(email === emailStock && mdp === mdpStock) {
        document.getElementById("message").innerText = "Connexion réussie !";
    } else {
        document.getElementById("message").innerText = "Email ou mot de passe incorrect";
    }
}
</script>

 <body style="text-align:center; font-family:Arial;">

<h2>Créer un compte</h2>

<input type="text" id="nom" placeholder="Nom"><br><br>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="mdp" placeholder="Mot de passe"><br><br>

<button onclick="inscrire()">S'inscrire</button>

<p id="message"></p>

<script>
function inscrire() {
    let nom = document.getElementById("nom").value;
    let email = document.getElementById("email").value;
    let mdp = document.getElementById("mdp").value;

    localStorage.setItem("nom", nom);
    localStorage.setItem("email", email);
    localStorage.setItem("mdp", mdp);

    document.getElementById("message").innerText = "Compte créé !";
}
</script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

/* HEADER */
header {
    background: #007aff;
    color: white;
    display: flex;
    justify-content: space-between;
    padding: 15px;

}

header h1 {
    margin: 0;
    font-size: 20px;
}

.panier {

}

/* GRILLE PRODUITS */
.boutique {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 15px;
}

/* PRODUIT */
.produit {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.produit img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.infos {
    padding: 10px;
}

.prix {
    color: green;
    font-weight: bold;
}

/* BOUTON */
button {
    width: 100%;
    padding: 10px;
    border: none;
    background: #25D366;
    color: white;
    border-radius: 8px;
    font-weight: bold;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
    <h1>📱 Ma Boutique</h1>

</header>

        <div class="infos">

    <!-- PRODUIT 2 -->

                <button>Commander sur WhatsApp</button>
            </a>
        </div>
    </div>

</div>

</body>
